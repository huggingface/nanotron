#   repeat: 2

s3_upload: null
tokenizer:
  tokenizer_max_length: null
  # tokenizer_name_or_path: unsloth/Llama-3.2-1B
  tokenizer_name_or_path: HuggingFaceTB/SmolLM-360M-Instruct
  tokenizer_revision: null
tokens:
  batch_accumulation_per_replica: 2
  limit_test_batches: 0
  limit_val_batches: 0
  micro_batch_size: 8
  sequence_length: 1024
  train_steps: 5000
  val_check_interval: -1
