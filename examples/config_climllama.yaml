checkpoints:
  checkpoint_interval: 1000
  checkpoints_path: checkpoints
  checkpoints_path_is_shared_file_system: false
  load_lr_scheduler: true
  load_optimizer: true
  resume_checkpoint_path: null
  save_final_state: true
  save_initial_state: false
data_stages:
- data:
    dataset:
      # Megatron IndexedDataset format (.bin/.idx files)
      # The dataset folder should also contain metadata.json with resolution hierarchy
      # and {prefix}_timestamps.npy for temporal features
      data_prefix:
      - /path/to/climate/dataset/train
      splits_string: "969,30,1"
      validation_drop_last: true
      eod_mask_loss: false
      no_seqlen_plus_one_input_tokens: false
      index_mapping_dir: null
      skip_warmup: false
      sampler_type: sequential
      pad_samples_to_global_batch_size: true
    num_loading_workers: 1
    seed: 42
  name: Climate Training Stage
  start_training_step: 1
general:
  benchmark_csv_path: null
  consumed_train_samples: null
  ignore_sanity_checks: true
  project: climllama
  run: climllama_%date_%jobid
  seed: 42
  step: null
lighteval: null
logging:
  iteration_step_info_interval: 1
  log_level: info
  log_level_replica: info
metrics_logging: null
model:
  ddp_bucket_cap_mb: 25
  dtype: bfloat16
  init_method:
    scaling_method: NUM_LAYERS
    std: 0.025
  make_vocab_size_divisible_by: 1
  model_config:
    # Base Qwen2/Llama architecture parameters
    _attn_implementation: flash_attention_2
    _fused_rms_norm: true
    _fused_rotary_emb: true
    _use_doc_masking: true
    _use_qkv_packed: true
    attention_bias: false
    bos_token_id: 1
    eos_token_id: 2
    flex_attention_mask: null
    hidden_act: silu
    hidden_size: 2048
    initializer_range: 0.02
    intermediate_size: 5504
    max_position_embeddings: 4096
    moe_config: null
    no_rope_layer: null
    num_attention_heads: 16
    num_hidden_layers: 24
    num_key_value_heads: 4
    pad_token_id: null
    pretraining_tp: 1
    rms_norm_eps: 1.0e-06
    rope_interleaved: false
    rope_scaling: null
    rope_theta: 10000.0
    sliding_window_size: null
    tie_word_embeddings: true
    use_cache: true
    # Vocabulary size includes special tokens from TokenWeaver
    # = codebook_size (32768) + special tokens
    vocab_size: 33312
    z_loss_coefficient: 0.0001
    z_loss_enabled: false

    # ClimLlama-specific configuration
    is_climllama_config: true

    # Absolute positional embedding parameters
    # When set to false, model is compatible with Qwen2/Llama
    use_absolute_position_embeddings: true

    # Discrete position embedding vocab sizes
    # var_vocab_size: Number of climate variables (including "unk" at index 0)
    var_vocab_size: 13
    variables:
    - unk
    - z      # Geopotential
    - t      # Temperature
    - q      # Specific humidity
    - u      # U-component of wind
    - v      # V-component of wind
    - w      # Vertical velocity
    - t2m    # 2m temperature
    - msl    # Mean sea level pressure
    - u10    # 10m U-wind
    - v10    # 10m V-wind
    - tp_1h  # Total precipitation 1h
    - tp_6h  # Total precipitation 6h

    # res_vocab_size: Number of resolution levels (loaded from dataset metadata.json)
    res_vocab_size: 12

    # leadtime_vocab_size: Embed N possible lead times (e.g., 0h, 6h, ..., 72h)
    leadtime_vocab_size: 13
    leadtime_step: "6h"

    # Spatial-temporal continuous position encoding
    use_spatial_temporal_encoding: true
    spatial_temporal_encoding_dim: 128

optimizer:
  accumulate_grad_in_fp32: true
  clip_grad: 1.0
  learning_rate_scheduler:
    learning_rate: 0.0003
    lr_decay_starting_step: null
    lr_decay_steps: 100000
    lr_decay_style: cosine
    lr_warmup_steps: 2000
    lr_warmup_style: linear
    min_decay_lr: 1.0e-05
  optimizer_factory:
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    name: adamW
    torch_adam_is_fused: true
  weight_decay: 0.01
  weight_decay_exclude_named_params: []
  zero_stage: 0
parallelism:
  context_parallel_size: 1
  dp: 4
  expert_parallel_size: 1
  pp: 1
  pp_engine: 1f1b
  recompute_layer: false
  tp: 2
  tp_linear_async_communication: true
  tp_mode: REDUCE_SCATTER
  tp_recompute_allgather: true
profiler: null
s3_upload: null
tokenizer:
  tokenizer_max_length: null
  # Use the TokenWeaver tokenizer from atmtokenizer
  tokenizer_name_or_path: /path/to/tokenweaver/tokenizer
  tokenizer_revision: null
tokens:
  batch_accumulation_per_replica: 1
  limit_test_batches: 0
  limit_val_batches: 0
  micro_batch_size: 4
  sequence_length: 4096
  train_steps: 100000
  val_check_interval: -1
